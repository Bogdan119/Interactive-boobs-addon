<script src="https://cdn.jsdelivr.net/npm/gsap@3"></script>

<style>
  .css3-boobs-demo {
    margin: 0;
    width: 620px;
    max-width: 100vw;
    position: fixed;
    left: 50%;
    top: 50%;
    z-index: 9999;
    transform-origin: top center;
    will-change: transform;
    pointer-events: none;
  }

  .css3-boobs-demo .body {
    margin: 10px auto 0;
    width: 400px;
    height: 280px;
    padding-top: 20px;
    overflow: hidden;
    position: relative;
    background: transparent;
    transform: scale(1.85);
    transform-origin: top center;
    opacity: 0.66;
    filter: saturate(1.15);
  }

  .css3-boobs-demo .chest {
    width: 230px;
    margin: 0 auto;
    height: 80px;
    position: relative;
    z-index: 2;
  }

  .css3-boobs-demo .chest .left, .css3-boobs-demo .chest .right {
    position: absolute;
    top: 0;
    width: 90px;
    height: 40px;
    border: 2px solid #000;
    border-bottom: none;
    background: transparent;
  }

  .css3-boobs-demo .chest .left {
    left: 0;
    border-top-left-radius: 40px;
    transform: rotate(-20deg);
    border-right: none;
  }

  .css3-boobs-demo .chest .right {
    right: 0;
    border-top-right-radius: 40px;
    transform: rotate(25deg);
    border-left: none;
  }

  .css3-boobs-demo .chest .clavicle {
    position: absolute;
    top: 10px;
    height: 0;
    width: 46px;
    border-top: 2px solid #000;
  }

  .css3-boobs-demo .chest .left .clavicle {
    left: 40px;
    transform: rotate(21deg);
  }

  .css3-boobs-demo .chest .right .clavicle {
    right: 40px;
    transform: rotate(-21deg);
  }

  .css3-boobs-demo .breast {
    width: 222px;
    height: 40px;
    margin: 0 auto;
    position: relative;
    z-index: 2;
  }

  .css3-boobs-demo .breast .left {
    position: absolute;
    left: 0;
    top: 0;
    animation: none;
    will-change: transform;
  }

  .css3-boobs-demo .breast .right {
    position: absolute;
    right: 0;
    top: 0;
    animation: none;
    will-change: transform;
  }

  .css3-boobs-demo .breast .between {
    margin: 0 auto;
    width: 1px;
    height: 26px;
    border-right: 2px solid #000;
    position: relative;
    top: -26px;
  }

  .css3-boobs-demo .breast .boob {
    border: 2px solid #000;
    border-top: none;
    border-radius: 0 0 60px 60px;
    transform: rotate(15deg);
    width: 100px;
    height: 56px;
    padding: 0;
    margin: 0;
    background: transparent;
    cursor: pointer;
  }

  .css3-boobs-demo .breast .right .boob {
    transform: rotate(-15deg);
  }

  .css3-boobs-demo .breast .boob li {
    margin: 0 auto;
    padding: 18px 0 0;
    font-size: 40px;
    line-height: 20px;
    width: 20px;
    height: 20px;
    list-style-position: inside;
    color: rgba(255, 168, 168, 0.62);
  }

  .css3-boobs-demo .thigh {
    width: 230px;
    height: 40px;
    position: relative;
    top: -79px;
    z-index: 2;
    margin: 0 auto;
    overflow: hidden;
    display: none;
  }

  .css3-boobs-demo .thigh .left, .css3-boobs-demo .thigh .right {
    width: 70px;
    height: 70px;
    border-style: solid;
    border-color: #000;
    position: relative;
    background: transparent;
  }

  .css3-boobs-demo .thigh .left {
    border-width: 1px 0 0 1px;
    border-top-left-radius: 70px;
    transform: rotate(-40deg);
    float: left;
  }

  .css3-boobs-demo .thigh .right {
    border-width: 1px 1px 0 0;
    border-top-right-radius: 70px;
    transform: rotate(40deg);
    float: right;
  }
</style>

<div class="css3-boobs-demo">
  <div class="body">
    <div class="chest">
      <div class="left"><div class="clavicle"></div></div>
      <div class="right"><div class="clavicle"></div></div>
    </div>

    <div class="breast">
      <div class="left"><ul class="boob"><li class="nipple"></li></ul></div>
      <div class="right"><ul class="boob"><li class="nipple"></li></ul></div>
      <div class="between"></div>
    </div>

    <div class="thigh">
      <div class="left"></div>
      <div class="right"></div>
    </div>
  </div>
</div>

<script>
(() => {
  const boobsDemo = document.querySelector(".css3-boobs-demo");
  const boobsBody = document.querySelector(".css3-boobs-demo .body");
  const boobsSides = document.querySelectorAll(".css3-boobs-demo .breast .left, .css3-boobs-demo .breast .right");
  const nipples = document.querySelectorAll(".css3-boobs-demo .breast .boob .nipple");

  if (!boobsDemo || !boobsBody || typeof gsap === "undefined") return;

  let targetX = 0;
  let targetY = 0;
  let posX = 0;
  let posY = 0;
  let velX = 0;
  let velY = 0;
  let scrollYTarget = window.scrollY || window.pageYOffset || 0;
  let scrollYPos = scrollYTarget;
  let scrollVel = 0;
  let jiggleY = 0;
  let jiggleVel = 0;
  // s1 = san stang, s2 = san drept
  let s1x = 0;
  let s2x = 0;
  let s1vx = 0;
  let s2vx = 0;
  let sY = 0;
  let sYv = 0;
  let n1x = 0;
  let n2x = 0;
  let n1y = 0;
  let n2y = 0;
  let n1vx = 0;
  let n2vx = 0;
  let n1vy = 0;
  let n2vy = 0;
  const baseScale = 1.85;

  const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

  const onPointerMove = (e) => {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    targetX = (e.clientX - cx) * 0.085;
    targetY = (e.clientY - cy) * 0.04;
  };

  const onScroll = () => {
    scrollYTarget = window.scrollY || window.pageYOffset || 0;
  };

  window.addEventListener("pointermove", onPointerMove, { passive: true });
  window.addEventListener("scroll", onScroll, { passive: true });

  gsap.ticker.add(() => {
    const spring = 0.085;
    const damping = 0.855;

    velX += (targetX - posX) * spring;
    velY += (targetY - posY) * spring;

    velX *= damping;
    velY *= damping;

    posX += velX;
    posY += velY;

    scrollVel += (scrollYTarget - scrollYPos) * 0.11;
    scrollVel *= 0.78;
    scrollYPos += scrollVel;

    const scrollImpulse = Math.abs(scrollVel) > 0.15 ? scrollVel * 0.18 : 0;
    jiggleVel += scrollImpulse;
    jiggleVel += (0 - jiggleY) * 0.16;
    jiggleVel *= 0.76;
    jiggleY += jiggleVel;
    const scrollJiggle = clamp(jiggleY, -26, 26);

    // Directii NVSE:
    // E (dreapta): s1/s2 raman in urma => merg spre stanga
    // V (stanga): opus => merg spre dreapta
    // N (sus): ambii intra putin spre interior
    // S (jos): ambii ies putin spre exterior
    // Inertie diferentiata pe V/E:
    // - cand mergem spre V (stanga), s1 (mai aproape de V) are raspuns opus mai puternic
    // - cand mergem spre E (dreapta), s2 (mai aproape de E) are raspuns opus mai puternic
    const dirNorm = clamp(velX / 12, -1, 1); // -1=V, +1=E
    const baseOpp = clamp(-velX * 1.15, -26, 26);
    const s1LagX = baseOpp * (1 - 0.35 * dirNorm);
    const s2LagX = baseOpp * (1 + 0.35 * dirNorm);
    // intentie verticala stabila: combina directia ceruta cu viteza curenta
    const nsIntent = (targetY - posY) * 0.45 + velY * 0.85;
    const inwardN = clamp((-nsIntent) * 1.05, 0, 20);
    const outwardS = clamp((nsIntent) * 1.05, 0, 22);
    const liftYTarget = clamp(nsIntent * 0.42, -10, 10);

    const s1TargetX = s1LagX + inwardN - outwardS; // stang: + interior la N, - exterior la S
    const s2TargetX = s2LagX - inwardN + outwardS; // drept: - interior la N, + exterior la S

    if (Math.abs(targetX - posX) < 0.04 && Math.abs(velX) < 0.04) {
      posX = targetX;
      velX = 0;
    }
    if (Math.abs(targetY - posY) < 0.04 && Math.abs(velY) < 0.04) {
      posY = targetY;
      velY = 0;
    }

    // Arc amortizat separat pe s1/s2 (bounce natural, fara snap la centru)
    s1vx += (s1TargetX - s1x) * 0.2;
    s2vx += (s2TargetX - s2x) * 0.2;
    s1vx *= 0.78;
    s2vx *= 0.78;
    s1x += s1vx;
    s2x += s2vx;
    sYv += (liftYTarget - sY) * 0.2;
    sYv *= 0.8;
    sY += sYv;

    const scale = baseScale;
    const twist = clamp(velX * 0.15, -7, 7);
    const bob = clamp(Math.hypot(velX, velY) * 0.1, 0, 6);

    gsap.set(boobsDemo, { xPercent: -50, yPercent: -50, x: posX, y: posY, rotation: twist });
    gsap.set(boobsBody, { scale: scale, opacity: clamp(0.6 + Math.abs(velY) * 0.002, 0.58, 0.74) });

    // s1 (index 0), s2 (index 1)
    gsap.set(boobsSides[0], {
      x: s1x,
      y: -bob + scrollJiggle + sY,
      rotation: clamp(velX * 0.17, -10, 10)
    });
    gsap.set(boobsSides[1], {
      x: s2x,
      y: -bob + scrollJiggle + sY,
      rotation: clamp(-velX * 0.17, -10, 10)
    });

    // Punctele roz: inertie proprie, relativ la miscarea s1/s2
    if (nipples.length >= 2) {
      const nsSpread = clamp(velY * 0.75, -10, 10); // S: exterior, N: interior
      const n1TargetX = clamp(s1vx * -1.35 + velX * -0.4 - nsSpread, -24, 24);
      const n2TargetX = clamp(s2vx * -1.35 + velX * -0.4 + nsSpread, -24, 24);
      const nTargetY = clamp((Math.abs(velX) + Math.abs(velY)) * -0.16 + scrollJiggle * 0.2, -16, 16);

      n1vx += (n1TargetX - n1x) * 0.1;
      n2vx += (n2TargetX - n2x) * 0.1;
      n1vy += (nTargetY - n1y) * 0.1;
      n2vy += (nTargetY - n2y) * 0.1;

      n1vx *= 0.92;
      n2vx *= 0.92;
      n1vy *= 0.93;
      n2vy *= 0.93;

      n1x += n1vx;
      n2x += n2vx;
      n1y += n1vy;
      n2y += n2vy;

      gsap.set(nipples[0], { x: n1x, y: n1y });
      gsap.set(nipples[1], { x: n2x, y: n2y });
    }

  });
})();
</script>
